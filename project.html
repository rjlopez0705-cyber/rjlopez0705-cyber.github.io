<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
}

#top, #bottom{
    background-color: bisque;
    height:100px;
    display:flex;
    align-items:center;
    justify-content:center;
}

#top h1{
    text-align:center;
}

#menu{
    background-color:grey;
    height:50px;
}

#content{
    background-color: rgb(95,220,8);
}

#side{
    background-color:white;
    width:30%;
    float:left;
    height:300px;
    padding:10px;
}

#part, #post{
    background-color:white;
    width:30%;
    float:left;
    padding:10px;
}

#bottom{
    clear:both;
    text-align:center;
}

p{
    text-align:justify;
}

ul{
    list-style-type:none;
    margin:0;
    padding:0;
    overflow:hidden;
    background-color:#333;
}

li{
    float:left;
}

li a{
    display:block;
    color:white;
    text-align:center;
    padding:16px;
    text-decoration:none;
}

li a:hover{
    background-color:red;
}

@media screen and (max-width:700px){
    #side,#part,#post{
        width:100%;
    }
}
</style>

</head>

<body>

<div id="top">
    <h1>Header</h1>
</div>

<div id="menu">
<ul>
<li><a href="#">Home</a></li>
<li><a href="#">News</a></li>
<li><a href="#">Contact</a></li>
<li><a href="#">About</a></li>
</ul>
</div>

<div id="content">

<div id="side">
<h2>Side</h2>
<p>Sample text here.</p>
</div>

<div id="part">
<h2>Part</h2>
<p>Sample text here.</p>
<p>Sample text here.</p>
</div>

<div id="post">
<h2>Post</h2>
<p>Sample text here.</p>
<p>Sample text here.</p>
</div>

</div>

<div id="bottom">
<h2>Footer</h2>
</div>

</body>
</html>
